<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Quick Comp</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#15244C" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Quick Comp" />
    <script>
      /* Crash reporter — inert unless the app errors; then it quietly sends the
         exact error to the server so it can be read at /errors. Fully wrapped so
         it can never itself break the page. */
      (function () {
        try {
          var sent = 0, seen = {};
          function report(p) {
            try {
              if (sent >= 8) return;
              var k = (p.msg || "") + (p.line || "");
              if (seen[k]) return; seen[k] = 1; sent++;
              // Never ship credentials to the log: the PWA start_url and staff
              // links can carry ?key=/?pass=/session tokens in the URL.
              p.ua = navigator.userAgent;
              p.url = String(location.href).replace(/([?&#](s|key|pass|session|token|invite)=)[^&#]*/gi, "$1REDACTED");
              p.t = new Date().toISOString();
              fetch("/api/clienterror", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(p), keepalive: true }).catch(function () {});
            } catch (e) {}
          }
          window.addEventListener("error", function (e) {
            report({ kind: "error", msg: (e && e.message) || String(e), src: e && e.filename, line: e && e.lineno, col: e && e.colno, stack: e && e.error && e.error.stack ? String(e.error.stack).slice(0, 1400) : "" });
          });
          window.addEventListener("unhandledrejection", function (e) {
            var r = e && e.reason;
            report({ kind: "promise", msg: r && r.message ? r.message : String(r), stack: r && r.stack ? String(r.stack).slice(0, 1400) : "" });
          });
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
